<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Collapse↑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:        #c9a96e;
  --gold-bright: #f0cc88;
  --gold-dim:    rgba(201,169,110,0.35);
  --cream:       #f0e6d0;
  --cream-dim:   rgba(240,230,208,0.72);
  --cream-ghost: rgba(240,230,208,0.40);
  --ascending:   #ffe8b0;
  --bg:          #090805;

  --fb:  clamp(20px,5vw,26px);
  --fs:  clamp(16px,4vw,20px);
  --fl:  clamp(12px,3vw,14px);
  --fw:  clamp(56px,14vw,86px);
  --fwm: clamp(26px,6.5vw,36px);
  --fsa: clamp(140px,36vw,210px);
  --fsw: clamp(28px,7vw,42px);
}
body.large {
  --fb: clamp(24px,6vw,30px);
  --fs: clamp(19px,4.8vw,24px);
  --fl: clamp(14px,3.5vw,17px);
}

html, body {
  width:100%; height:100%; overflow:hidden;
  background:var(--bg);
  font-family:'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-weight:300; color:var(--cream);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
* { box-sizing:border-box; }
a { color:inherit; text-decoration:none; }
@media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:.01ms!important; transition-duration:.4s!important; } }
@media (prefers-contrast:high) { :root { --cream:#fff; --gold:#ffd700; --gold-bright:#ffe44d; --bg:#000; } }

/* ── AURORA ── */
.aurora { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.al { position:absolute; border-radius:50%; filter:blur(90px); opacity:0; transition:opacity 4s ease; }
.al.on { opacity:1; }
.a1 { width:70vw;height:70vw;background:radial-gradient(circle,rgba(201,169,110,.10) 0%,transparent 70%);top:-15%;left:-15%;animation:d1 24s ease-in-out infinite; }
.a2 { width:55vw;height:55vw;background:radial-gradient(circle,rgba(255,220,140,.07) 0%,transparent 70%);bottom:-10%;right:-10%;animation:d2 30s ease-in-out infinite; }
.a3 { width:45vw;height:45vw;background:radial-gradient(circle,rgba(255,248,220,.05) 0%,transparent 70%);top:35%;left:25%;animation:d3 20s ease-in-out infinite; }
@keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(8vw,5vw)}}
@keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-5vw,-7vw)}}
@keyframes d3{0%,100%{transform:translate(0,0)}50%{transform:translate(4vw,-4vw)}}
#particleCanvas { position:fixed;inset:0;z-index:1;pointer-events:none; }

/* ── SCREENS ── */
.screen { position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;padding:clamp(24px,6vw,48px) clamp(20px,5vw,36px); }
.screen.active { opacity:1;pointer-events:all; }

/* ── DESKTOP PANEL ── */
@media (min-width:600px) {
  .screen {
    /* Centre a mobile-width panel on desktop */
    left:50%;
    transform:translateX(-50%);
    width:min(480px, 100vw);
    right:auto;
    border-left:1px solid rgba(201,169,110,.04);
    border-right:1px solid rgba(201,169,110,.04);
  }
  #chrome {
    left:50%;
    transform:translateX(-50%);
    width:min(480px, 100vw);
  }
  #taph, #tapNext {
    /* Keep tap hints centred within the panel */
    left:50%;
    transform:translateX(-50%);
  }
  .grid { max-width:440px; }
  .stage-inner { max-width:420px; }
}

/* ── BURST ── */
.burst-el { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:0;height:0;border-radius:50%;background:radial-gradient(circle,rgba(255,232,176,.60) 0%,rgba(255,200,80,.22) 30%,transparent 70%);pointer-events:none;z-index:200;opacity:0; }
.burst-el.go { animation:bx 1s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes bx{0%{width:0;height:0;opacity:.85;margin:0}100%{width:200vmax;height:200vmax;margin:-100vmax;opacity:0}}

/* ── GHOST STATE NAMES ── */
#ghosts { position:fixed;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity 1.4s ease; }
.gst { position:absolute;font-family:'Plus Jakarta Sans',sans-serif;font-size:var(--fl);letter-spacing:.12em;color:rgba(201,169,110,.10);animation:gd 9s ease-in-out infinite;font-weight:300; }
@keyframes gd{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* ── UTILITY ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes tp{0%,100%{opacity:.38}50%{opacity:.80}}
.divider { width:44px;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);margin:6px auto; }

/* ── CHROME ── */
#chrome { position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:18px 22px;z-index:300; }
.chrome-btn { font-family:'Plus Jakarta Sans',sans-serif;font-size:var(--fl);letter-spacing:.10em;color:rgba(201,169,110,.55);background:none;border:none;cursor:pointer;padding:10px 14px;min-height:44px;min-width:52px;-webkit-tap-highlight-color:transparent;transition:color .4s ease;font-weight:300; }
.chrome-btn:hover { color:var(--gold-bright); }

/* ════════════════════════════════
   SIGIL SCREEN
   FIX: wordmark reveal — "Collapse" first, then "↑" joins it.
   No sigilParticle. No stray dot.
════════════════════════════════ */
#s-sigil { z-index:50; gap:0; justify-content:center; align-items:center; }

/* Wordmark container — keeps word and arrow inline, centred */
.sigil-wm {
  display:flex;
  align-items:baseline;
  gap:0;
}

/* "Collapse" — fades in from slight blur */
#sigilWord {
  font-family:'Plus Jakarta Sans', sans-serif;
  font-size: var(--fsw);
  font-weight: 300;
  letter-spacing: .22em;
  color: var(--gold);
  opacity: 0;
  filter: blur(8px);
  transition: opacity 2.2s ease, filter 2.2s ease;
  user-select: none;
  pointer-events: none;
}
#sigilWord.on {
  opacity: 1;
  filter: blur(0);
}

/* "↑" — fades in after word, with upward drift from below */
#sigilArrowEl {
  font-family:'Plus Jakarta Sans', sans-serif;
  font-size: var(--fsw);
  font-weight: 300;
  color: var(--gold-bright);
  opacity: 0;
  filter: blur(6px);
  transform: translateY(6px);
  transition: opacity 1.8s ease, filter 1.8s ease, transform 1.8s cubic-bezier(.16,1,.3,1);
  text-shadow: 0 0 30px rgba(240,204,136,.55), 0 0 70px rgba(201,169,110,.28);
  user-select: none;
  pointer-events: none;
  /* letter-spacing reset so arrow sits flush */
  letter-spacing: 0;
  padding-left: .10em;
}
#sigilArrowEl.on {
  opacity: 1;
  filter: blur(0);
  transform: translateY(0);
}

/* ════════════════════════════════
   INITIATION
════════════════════════════════ */
#s-init { justify-content:flex-end; gap:0; padding-bottom:clamp(80px,20vw,130px); }

.init-content {
  width:100%; max-width:340px;
  text-align:center;
}

.step { display:none; flex-direction:column; align-items:center; gap:clamp(20px,5vw,28px); width:100%; }
.step.on { display:flex; }

.s-main {
  font-size:var(--fb);
  font-weight:300;
  line-height:1.72;
  color:var(--cream);
  letter-spacing:.01em;
}
.s-main b { color:var(--gold-bright); font-weight:300; }

.s-sup {
  font-size:var(--fs);
  font-weight:300;
  line-height:1.80;
  color:var(--cream-dim);
  letter-spacing:.01em;
}
.s-sup b { color:var(--gold); font-weight:300; }

.s-eq {
  font-size:clamp(12px,3vw,15px);
  font-weight:300;
  color:rgba(201,169,110,.50);
  letter-spacing:.04em;
  line-height:1.6;
  font-family:'Plus Jakarta Sans',sans-serif;
}

.s-note {
  font-size:var(--fl);
  font-weight:300;
  color:var(--cream-ghost);
  line-height:1.7;
  padding-top:clamp(14px,3.5vw,20px);
  border-top:1px solid rgba(201,169,110,.12);
  width:100%;
}
.s-note b { color:rgba(201,169,110,.55); font-weight:300; }

.ready-btn {
  background:none;
  border:1px solid rgba(201,169,110,.28);
  color:rgba(201,169,110,.70);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:var(--fs); font-weight:300;
  letter-spacing:.10em;
  padding:18px 44px; cursor:pointer;
  border-radius:3px; min-height:58px;
  -webkit-tap-highlight-color:transparent;
  transition:all .5s ease;
  margin-top:8px;
}
.ready-btn:hover, .ready-btn:active {
  background:rgba(201,169,110,.08);
  border-color:rgba(201,169,110,.50);
  color:var(--gold-bright);
}

#sdots { position:fixed;bottom:54px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20;pointer-events:none; }
.sdot { width:5px;height:5px;border-radius:50%;background:rgba(201,169,110,.18);transition:background .6s ease; }
.sdot.on { background:rgba(201,169,110,.58); }
#taph { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Plus Jakarta Sans',sans-serif;font-size:var(--fl);letter-spacing:.14em;color:rgba(201,169,110,.38);animation:tp 2.8s ease-in-out infinite;pointer-events:none;z-index:20;white-space:nowrap;font-weight:300; }

/* ════════════════════════════════
   FIELD
════════════════════════════════ */
#s-field { gap:10px; }

.f-wordmark { font-family:'Plus Jakarta Sans',sans-serif;font-size:var(--fwm);font-weight:300;letter-spacing:.16em;color:var(--gold);user-select:none;-webkit-tap-highlight-color:transparent;padding:6px 16px;display:inline-block; }
.f-wordmark .wm-arrow { display:inline-block;animation:wmA 3s ease-in-out infinite; }
@keyframes wmA{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

.f-line { font-size:var(--fs);color:var(--cream-dim);text-align:center;font-weight:300;letter-spacing:.02em; }

.grid { display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:420px; }
.orb {
  display:flex;align-items:center;justify-content:center;
  height:clamp(80px,18vw,96px);
  border:1px solid rgba(201,169,110,.20);border-radius:10px;
  background:radial-gradient(ellipse at center,rgba(201,169,110,.09) 0%,rgba(201,169,110,.03) 45%,transparent 100%);
  box-shadow:inset 0 0 20px rgba(201,169,110,.05);
  cursor:pointer;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
  transition:border-color .4s ease,box-shadow .4s ease,background .4s ease;
}
.orb:nth-child(1){animation:orbP 4.1s ease-in-out infinite}
.orb:nth-child(2){animation:orbP 5.3s ease-in-out infinite}
.orb:nth-child(3){animation:orbP 3.7s ease-in-out infinite}
.orb:nth-child(4){animation:orbP 6.1s ease-in-out infinite}
.orb:nth-child(5){animation:orbP 4.8s ease-in-out infinite}
.orb:nth-child(6){animation:orbP 3.4s ease-in-out infinite}
.orb:nth-child(7){animation:orbP 5.7s ease-in-out infinite}
.orb:nth-child(8){animation:orbP 4.4s ease-in-out infinite}
@keyframes orbP{
  0%,100%{background:radial-gradient(ellipse at center,rgba(201,169,110,.08) 0%,rgba(201,169,110,.02) 45%,transparent 100%);box-shadow:inset 0 0 16px rgba(201,169,110,.04);}
  50%    {background:radial-gradient(ellipse at center,rgba(201,169,110,.14) 0%,rgba(201,169,110,.05) 45%,transparent 100%);box-shadow:inset 0 0 26px rgba(201,169,110,.09),0 0 14px rgba(201,169,110,.05);}
}
/* orb:active removed — iOS sticky touch state causes singled-out glow bug */
.oname { font-family:'Plus Jakarta Sans',sans-serif;font-weight:300;letter-spacing:.06em;color:var(--cream);position:relative;z-index:1;transition:color .3s ease,text-shadow .3s ease;padding:0 6px;text-align:center;line-height:1; }
/* orb:active .oname removed */

.glyphs { display:flex;gap:0;align-items:center;border-top:1px solid rgba(201,169,110,.08);padding-top:6px;width:100%;max-width:390px;justify-content:center; }
.glyph-wrap { display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 28px; }
.glyph { background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(18px,4.5vw,24px);color:rgba(201,169,110,.35);cursor:pointer;padding:8px 14px;min-width:50px;min-height:44px;-webkit-tap-highlight-color:transparent;transition:color .4s ease;display:block; }
.glyph:hover { color:var(--gold); }
.glyph-label { font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(9px,2.2vw,11px);letter-spacing:.14em;color:rgba(201,169,110,.20);text-transform:uppercase;pointer-events:none;font-weight:300; }

.obs-ct { font-family:'Plus Jakarta Sans',sans-serif;font-size:var(--fs);font-weight:300;letter-spacing:.04em;color:rgba(201,169,110,.28);text-align:center;min-height:22px; }
.revisit-wrap { display:flex;justify-content:center;width:100%; }
#revisitBtn { background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:var(--fl);letter-spacing:.12em;color:rgba(201,169,110,.40);cursor:pointer;padding:10px 20px;min-height:40px;-webkit-tap-highlight-color:transparent;transition:color .4s ease;font-weight:300; }
#revisitBtn:hover { color:rgba(201,169,110,.65); }

/* ════════════════════════════════
   COLLAPSE — 6 STAGES
════════════════════════════════ */
#s-collapse { cursor:pointer;-webkit-tap-highlight-color:transparent; }
.cp-stage { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:clamp(24px,6vw,48px) clamp(24px,6vw,40px);text-align:center;opacity:0;pointer-events:none;transition:opacity .9s ease;visibility:hidden;z-index:1; }
.cp-stage.on { opacity:1;pointer-events:all;visibility:visible;z-index:2; }
.stage-inner { display:flex;flex-direction:column;align-items:center;gap:22px;width:100%;max-width:370px; }

/* stage 1 — FIX: removed .collapsed-dot, particle canvas is the only light source */
.cword { font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(24px,8vw,60px);font-weight:300;letter-spacing:.06em;color:var(--ascending);text-shadow:0 0 40px rgba(255,232,176,.60),0 0 80px rgba(255,200,80,.28);line-height:1;width:100%;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis; }
.c-confirm-label { font-family:'Plus Jakarta Sans',sans-serif;font-size:var(--fl);letter-spacing:.14em;color:var(--gold);display:block;font-weight:300;margin-bottom:4px; }
.c-confirm-sub   { font-size:var(--fs);color:var(--cream-ghost);font-weight:300; }

/* stage 2 */
.c-eq-box  { width:100%;padding:20px 22px;border:1px solid rgba(201,169,110,.16);border-radius:6px;background:rgba(201,169,110,.03); }
.c-eq      { font-size:clamp(13px,3.2vw,16px);color:rgba(201,169,110,.70);letter-spacing:.04em;margin-bottom:10px;font-weight:300;line-height:1.6; }
.c-eq-note { font-size:var(--fs);color:var(--cream-ghost);font-weight:300; }

/* stage 3 */
.imag-label  { font-size:var(--fl);letter-spacing:.18em;color:rgba(201,169,110,.45);text-transform:uppercase;font-weight:300;display:block; }
.imag-prompt { font-size:var(--fb);color:var(--cream-dim);line-height:1.82;font-style:italic;max-width:330px;font-weight:300; }

/* stage 4 — breath */
.breath-wrap {
  display:flex; flex-direction:column; align-items:center;
  gap:0; width:100%; position:relative;
}
.bpwrap {
  position:relative; display:flex; align-items:center;
  justify-content:center; width:120px; height:120px;
  margin-bottom: 48px;
}
.bp {
  width:22px; height:22px; border-radius:50%;
  background:var(--gold-bright);
  box-shadow:0 0 18px var(--gold),0 0 50px rgba(201,169,110,.28);
}
.bp.neutral  { transition:transform .8s ease,filter .8s ease,box-shadow .8s ease; }
.bp.inhaling {
  transition:transform 4s cubic-bezier(.4,0,.2,1),filter 4s ease,box-shadow 4s ease;
  transform:scale(3.2); filter:blur(4px);
  box-shadow:0 0 8px rgba(201,169,110,.15),0 0 40px rgba(201,169,110,.06);
}
.bp.holding  {
  transition:transform 2s ease,filter 2s ease;
  transform:scale(3.2); filter:blur(2.5px);
}
.bp.exhaling {
  transition:transform 4s cubic-bezier(.4,0,.2,1),filter 4s ease,box-shadow 4s ease;
  transform:scale(1); filter:blur(0);
  box-shadow:0 0 28px var(--gold-bright),0 0 80px rgba(240,204,136,.45),0 0 120px rgba(255,232,176,.2);
}
.bp.crystallised {
  transition:transform 1.2s ease,filter 1.2s ease,box-shadow 1.2s ease;
  transform:scale(1.4); filter:blur(0);
  box-shadow:0 0 40px var(--gold-bright),0 0 100px rgba(240,204,136,.6),0 0 180px rgba(255,232,176,.3);
  animation:crystallPulse 2.8s ease-in-out infinite;
}
@keyframes crystallPulse {
  0%,100% { box-shadow:0 0 40px var(--gold-bright),0 0 100px rgba(240,204,136,.6),0 0 180px rgba(255,232,176,.3); }
  50%      { box-shadow:0 0 60px var(--gold-bright),0 0 140px rgba(240,204,136,.8),0 0 240px rgba(255,232,176,.45); }
}
.bripple {
  position:absolute; width:22px; height:22px; border-radius:50%;
  border:1px solid rgba(201,169,110,.4); pointer-events:none; opacity:0;
}
.bripple.expand { animation:ripOut 4s cubic-bezier(.4,0,.2,1) forwards; }
@keyframes ripOut{0%{opacity:.5;transform:scale(1)}100%{opacity:0;transform:scale(10)}}

.btext-slot {
  height: clamp(40px,10vw,56px);
  display:flex; align-items:center; justify-content:center;
  width:100%; position:relative;
}
.btext {
  position:absolute;
  font-size:var(--fb); font-weight:300;
  color:var(--cream); text-align:center;
  letter-spacing:.04em; line-height:1.4;
  width:100%; padding:0 24px;
  transition:opacity 0.7s ease;
}
.btext.gold { color:var(--gold); font-size:var(--fw); letter-spacing:.10em; }
.btext.dim  { color:var(--cream-dim); font-size:var(--fs); line-height:1.7; }

.bdots { display:flex; gap:10px; margin-top:56px; }
.bdot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(201,169,110,.18);
  transition:background 0.8s ease;
}
.bdot.done { background:rgba(201,169,110,.60); }

.bend {
  position:absolute;
  font-size:var(--fs); color:var(--cream-dim);
  line-height:1.7; opacity:0;
  transition:opacity 1.2s ease;
  max-width:310px; text-align:center; font-weight:300;
}
.bend.on { opacity:1; }
.bend strong { color:var(--gold); font-weight:400; font-size:1.05em; }

/* stage 5 */
.obs-note { font-size:var(--fb);color:var(--cream-dim);line-height:1.72;max-width:330px;font-weight:300; }
.obs-note strong { color:var(--gold-bright);font-weight:400;font-size:1.06em;letter-spacing:.03em; }

/* stage 6 */
.q-label { font-size:var(--fl);letter-spacing:.18em;color:var(--gold-dim);display:block;margin-bottom:18px;font-weight:300;text-transform:uppercase; }
.q-text  { font-size:var(--fb);color:var(--cream);line-height:1.68;font-weight:300; }
.closing { font-size:var(--fs);color:rgba(201,169,110,.48);width:100%;max-width:340px;font-weight:300;line-height:1.65;text-align:center;opacity:0;box-sizing:border-box;padding:0 20px; }
.return-btn { background:none;border:none;color:rgba(201,169,110,.42);font-family:'Plus Jakarta Sans',sans-serif;font-size:var(--fs);letter-spacing:.12em;cursor:pointer;padding:16px 32px;min-height:52px;-webkit-tap-highlight-color:transparent;transition:color .4s ease;font-weight:300; }
.return-btn:hover { color:var(--gold); }
#tapNext { position:fixed;bottom:26px;left:50%;transform:translateX(-50%);font-family:'Plus Jakarta Sans',sans-serif;font-size:var(--fl);letter-spacing:.14em;color:rgba(201,169,110,.35);pointer-events:none;z-index:20;animation:tp 2.8s ease-in-out infinite;white-space:nowrap;font-weight:300;transition:opacity .7s ease; }

/* ── STILL ── */
#s-still { gap:30px; }
.still-p { width:16px;height:16px;border-radius:50%;background:var(--gold-bright);box-shadow:0 0 24px var(--gold),0 0 60px rgba(201,169,110,.26);animation:sb 6s ease-in-out infinite; }
@keyframes sb{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.still-txt { font-size:var(--fb);color:var(--cream-dim);text-align:center;line-height:1.82;font-weight:300; }
.still-tmr { font-size:var(--fb);letter-spacing:.18em;color:var(--gold-dim);font-weight:300; }

/* Orb superposition motion — asymmetric drift per word */
@keyframes spDriftH { 0%,100%{transform:translate(0,0) rotate(0deg)} 25%{transform:translate(-4px,1px) rotate(-0.3deg)} 75%{transform:translate(4px,-1px) rotate(0.3deg)} }
@keyframes spDriftV { 0%,100%{transform:translate(0,0) rotate(0deg)} 25%{transform:translate(1px,-4px) rotate(0.4deg)} 75%{transform:translate(-1px,3px) rotate(-0.2deg)} }
@keyframes spDriftD { 0%,100%{transform:translate(0,0) rotate(0deg)} 33%{transform:translate(-3px,-3px) rotate(-0.5deg)} 66%{transform:translate(3px,2px) rotate(0.3deg)} }
@keyframes spDriftR { 0%,100%{transform:translate(0,0) rotate(0deg)} 40%{transform:translate(3px,-2px) rotate(0.6deg)} 80%{transform:translate(-2px,3px) rotate(-0.4deg)} }
.orb { filter:blur(3px); opacity:0.6; transition:filter 0.5s ease, opacity 0.5s ease; }
.orb:nth-child(1) .oname { animation:spDriftH 3.1s ease-in-out infinite; }
.orb:nth-child(2) .oname { animation:spDriftV 4.3s ease-in-out infinite; }
.orb:nth-child(3) .oname { animation:spDriftD 2.9s ease-in-out infinite; }
.orb:nth-child(4) .oname { animation:spDriftR 5.1s ease-in-out infinite; }
.orb:nth-child(5) .oname { animation:spDriftH 3.7s ease-in-out infinite reverse; }
.orb:nth-child(6) .oname { animation:spDriftV 4.8s ease-in-out infinite reverse; }
.orb:nth-child(7) .oname { animation:spDriftD 3.3s ease-in-out infinite; }
.orb:nth-child(8) .oname { animation:spDriftR 2.7s ease-in-out infinite reverse; }
/* orb active blur override removed */
.orb.collapsing { filter:blur(0px) !important; opacity:1 !important; }
.orb.fading { filter:blur(5px) !important; opacity:0.08 !important; pointer-events:none; transition:filter 0.4s ease, opacity 0.4s ease; }


</style>

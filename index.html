<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collapse ↑</title>

<link rel="manifest" href="manifest.webmanifest">

<style>
:root {
  --gold-core: rgba(240,204,136,1);
}

body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:
    radial-gradient(circle at center, #141820 0%, #0c0f14 60%, #000000 100%);
  color:#e8d8b5;
}

#field{
  position:absolute;
  inset:0;
  overflow:hidden;
}

.star-layer{
  position:absolute;
  inset:0;
  background-image: radial-gradient(rgba(255,230,180,.15) 1px, transparent 1px);
  background-size: 120px 120px;
  opacity:.15;
  pointer-events:none;
}

.particle{
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--gold-core);
  box-shadow: 0 0 18px rgba(240,204,136,.3),
              0 0 40px rgba(240,204,136,.15);
  will-change:transform,opacity,filter,box-shadow;
}

#traits{
  position:absolute;
  bottom:8%;
  width:100%;
  text-align:center;
  opacity:0;
  filter:blur(6px);
  transition:opacity .7s ease, filter .7s ease;
}

#traits.visible{
  opacity:1;
  filter:blur(0);
}

.trait{
  display:inline-block;
  margin:8px 14px;
  cursor:pointer;
  opacity:1;
  transition:opacity .4s ease;
}

.trait.dim{ opacity:.3; }

#cue{
  position:absolute;
  top:20%;
  width:100%;
  text-align:center;
  opacity:0;
  transition:opacity .6s ease;
  white-space:pre-line;
}

#cue.visible{ opacity:1; }

#explain{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
  background:rgba(12,15,20,.85);
  white-space:pre-line;
}

#explain.visible{ display:flex; }

#lang{
  position:absolute;
  top:18px;
  right:20px;
  font-size:14px;
  opacity:.5;
  cursor:pointer;
}

#lang:hover{ opacity:.9; }

</style>
</head>

<body>

<div id="field">
  <div class="star-layer"></div>
</div>

<div id="traits"></div>
<div id="cue"></div>
<div id="explain"></div>
<div id="lang">EN · ES</div>

<script src="data.js?v=1.0.1"></script>
<script src="app.js?v=1.0.1"></script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
